services:
  - type: web
    name: haryana-my-love
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile=false && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
